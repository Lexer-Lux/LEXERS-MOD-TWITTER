<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1>Slopbuster</h1>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="totalBusted">—</span>
        <span class="stat-label">Users busted</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="lastSync">—</span>
        <span class="stat-label">Last sync</span>
      </div>
    </div>

    <div class="actions">
      <button id="syncBtn" class="btn btn-primary">Sync now</button>
      <button id="databaseBtn" class="btn btn-secondary">Browse database</button>
      <button id="settingsBtn" class="btn btn-secondary">Settings</button>
    </div>

    <div class="admin-section" id="adminSection" style="display:none">
      <div class="divider"></div>
      <button id="exportBtn" class="btn btn-secondary">Export blocklist JSON</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="lib/shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
